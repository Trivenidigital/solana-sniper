# /etc/nginx/sites-available/sniper-dashboard
#
# Reverse proxy for the Solana Sniper web dashboard.
# Proxies port 80 -> localhost:8080.
#
# To enable: ln -s /etc/nginx/sites-available/sniper-dashboard /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name _;  # Replace with your domain if you have one

    # Optional: Basic auth
    # auth_basic "Sniper Dashboard";
    # auth_basic_user_file /etc/nginx/.htpasswd;
    # To create: apt install apache2-utils && htpasswd -c /etc/nginx/.htpasswd admin

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:8080/health;
        access_log off;
    }
}

